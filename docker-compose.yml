services:
  db:
    image: mysql:8.0
    container_name: shieldauth-db
    restart: always
    environment:
      MYSQL_DATABASE: shieldauth_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - shieldauth-net

  redis:
    image: redis:alpine
    container_name: shieldauth-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - shieldauth-net

networks:
  shieldauth-net:
    driver: bridge

volumes:
  db_data: