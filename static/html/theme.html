<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appearance Settings</title>
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>

    <main id="theme-container">
        <header>
            <h1>Appearance</h1>
            <p>Select how you want the interface to look.</p>
        </header>

        <form id="formThemes">
            <label class="theme-card" for="darkTheme">
                <input type="radio" name="theme" id="darkTheme" value="dark" checked>
                <div class="card-content">
                    <div class="theme-preview dark-preview">
                        <div class="preview-line"></div>
                        <div class="preview-line short"></div>
                    </div>
                    <span class="theme-name">Dark Mode</span>
                </div>
            </label>

            <label class="theme-card" for="lightTheme">
                <input type="radio" name="theme" id="lightTheme" value="light">
                <div class="card-content">
                    <div class="theme-preview light-preview">
                        <div class="preview-line"></div>
                        <div class="preview-line short"></div>
                    </div>
                    <span class="theme-name">Light Mode</span>
                </div>
            </label>
        </form>

        <footer id="theme-footer">
            <button type="button" id="btn-back" onclick="window.history.back()">Save & Return</button>
        </footer>
    </main>

    <script src="../js/theme.js"></script>
</body>
</html>
