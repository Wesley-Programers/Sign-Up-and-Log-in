<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="stylesheet" href="../css/logIn.css">
</head>
<body>

    <main id="login-card">
        <header>
            <p id="welcomeBack">WELCOME BACK</p>
            <h1 id="signInTitle">LOG IN</h1>
        </header>

        <div id="error-messages">
            <p id="incorrectName" class="invisible">Incorrect name</p>
            <p id="incorrectEmail" class="invisible">Incorrect email</p>
            <p id="incorrectPassword" class="invisible">Incorrect password</p>
            <span id="invalidEmail" class="invisible">Invalid email</span>
        </div>

        <section id="login-section">
            <form id="formLogIn" method="post">
                <div id="div-sign-in">
                    <input type="text" id="name_or_email" required name="nameOrEmail" 
                           placeholder="Name or Email" autocomplete="username">
                    
                    <input type="password" id="password" required name="password" 
                           placeholder="Password" autocomplete="current-password">

                    <button id="signInButton" type="submit">Log in</button>
                </div>
            </form>

            <div class="login-footer">
                <button type="button" id="forgotPassword" class="link-btn">Forgot the password?</button>
                <button type="button" id="dontHaveAccount" class="link-btn">Don't have an account?</button>
            </div>
        </section>

        <section id="reset-section" class="invisible">
            <div id="emailForReset">
                <span id="email-instruction">Enter your account email to reset your password</span>
                
                <form method="post" id="formEmailForResetPassword">
                    <input type="email" required placeholder="Your email" name="email" id="inputEmailForResetPassword">
                    <button type="submit" id="sendResetButton">SEND</button>
                </form>

                <button type="button" id="leave" class="link-btn">LEAVE</button>
            </div>
        </section>

    </main>

    <script src="../js/login.js"></script>
</body>
</html>
