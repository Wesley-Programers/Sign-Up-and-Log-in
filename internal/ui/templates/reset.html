<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset the password</title>
</head>
<body>

    <form onsubmit="return false;" id="resetForm">
        <input type="password" name="currentPassword" id="currentPassword" required placeholder="Your password">
        <input type="password" name="newPassword" id="newPassword" required placeholder="Your new password">
        <input type="password" name="confirmNewPassword" id="confirmPassword" required placeholder="Confirm the password">

        <button type="submit" id="button">SEND</button>
    </form>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let resetForm = document.getElementById("resetForm");
            let button = document.getElementById("button");

            resetForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                button.disabled = true;

                const formData = new FormData(e.target)
                const data = new URLSearchParams(formData)
                
                try {
                    
                    const fetchResetPassword = await fetch("http://127.0.0.1:8000/reset/password", {
                        method: "POST",
                        body: data,
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        }
                    });

                    const status = fetchResetPassword.status
                    const message = await fetchResetPassword.text()
                    alert(`Status: ${status} Message: ${message}`);

                    if (status === 200 && message === "VALID") {
                        alert("SUCCESS");
                    } else {
                        alert("ERROR");
                    }

                } catch(error) {
                    console.error("ERROR: ", error)
                    alert("SOME ERROR");

                } finally {
                    button.disabled = false;
                };
            });
        });
    </script>
</body>
</html>
